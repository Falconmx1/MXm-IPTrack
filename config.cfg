# ==============================================
# MXm-IPTrack - Archivo de configuración
# ==============================================

# API principal (ip-api.com es gratis, sin clave)
API_URL="http://ip-api.com/json"

# API para geolocalización inversa (OpenStreetMap Nominatim)
GEO_API_URL="https://nominatim.openstreetmap.org/search"

# Tiempo de espera entre requests batch (segundos)
BATCH_DELAY=0.3

# Número máximo de intentos si falla la API
MAX_RETRIES=2

# Formato de salida predeterminado: "pretty" o "csv"
OUTPUT_FORMAT="pretty"

# Mostrar mapa automáticamente (true/false)
AUTO_MAP="false"

# Color mode (true/false)
COLOR_MODE="true"
