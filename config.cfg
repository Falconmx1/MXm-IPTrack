# ==============================================
# MXm-IPTrack - Archivo de configuración global
# Versión: 2.0
# Autor: Falconmx1
# ==============================================

# ==================== APIS ====================

# API principal para geolocalización de IPs (ip-api.com - gratuita, sin clave)
# Límite: 45 requests por minuto desde una misma IP
API_URL="http://ip-api.com/json"

# API para geolocalización inversa (buscar coordenadas por nombre de ciudad)
# OpenStreetMap Nominatim - gratuita, sin clave, requiere User-Agent
GEO_API_URL="https://nominatim.openstreetmap.org/search"

# API alternativa (ipinfo.io - requiere token, descomentar para usar)
# API_URL_ALT="https://ipinfo.io/"
# IPINFO_TOKEN="tu_token_aqui"

# ==================== COMPORTAMIENTO ====================

# Tiempo de espera entre requests en modo batch (segundos)
# Respetar límites de la API, mínimo 0.2
BATCH_DELAY=0.3

# Número máximo de reintentos si falla la API
MAX_RETRIES=2

# Timeout para conexiones curl (segundos)
CURL_TIMEOUT=10

# ==================== FORMATO DE SALIDA ====================

# Formato de salida predeterminado: "pretty" (bonito), "csv" (solo datos crudos), "quiet" (solo IPs)
OUTPUT_FORMAT="pretty"

# Mostrar mapa automáticamente en la terminal (true/false)
# Si es true, abre el navegador con Google Maps
AUTO_MAP="false"

# Navegador para abrir el mapa (firefox, google-chrome, xdg-open, etc.)
BROWSER="xdg-open"

# ==================== ESTILO VISUAL ====================

# Modo colores (true/false) - desactivar si hay problemas de compatibilidad
COLOR_MODE="true"

# Idioma de los mensajes: "es" (español) o "en" (inglés)
LANGUAGE="es"

# Mostrar banner al iniciar (true/false)
SHOW_BANNER="true"

# ==================== TELEGRAM ====================

# Configuración de Telegram (dejar vacío si no se usa)
# Cómo obtenerlos:
# 1. Bot Token: Habla con @BotFather en Telegram, crea un nuevo bot
# 2. Chat ID: Envía un mensaje a tu bot, luego visita:
#    https://api.telegram.org/bot<TU_TOKEN>/getUpdates
#    Ahí aparecerá tu chat_id (puede ser positivo o negativo)

TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Opcional: enviar mensajes con formato HTML en lugar de Markdown
TELEGRAM_PARSE_MODE="MarkdownV2"

# ==================== ARCHIVOS Y RUTAS ====================

# Directorio donde se guardan los reportes y logs
REPORT_DIR="$HOME/.config/mxtrack/reports"

# Archivo por defecto para modo batch (se puede sobrescribir con -b)
DEFAULT_BATCH_FILE="$HOME/.config/mxtrack/ips.txt"

# Archivo de log (guarda historial de consultas)
LOG_FILE="$HOME/.config/mxtrack/mxtrack.log"

# ==================== OPCIONES AVANZADAS ====================

# Verificar SSL (true/false) - desactivar si hay problemas de certificados
SSL_VERIFY="true"

# User-Agent personalizado para las peticiones
USER_AGENT="MXm-IPTrack/2.0 (https://github.com/Falconmx1/MXm-IPTrack)"

# Proxy (dejar vacío si no se usa)
# Formato: "http://usuario:contraseña@ip:puerto" o "socks5://ip:puerto"
HTTP_PROXY=""
HTTPS_PROXY=""

# ==================== NOTIFICACIONES ====================

# Notificaciones por escritorio (true/false) - solo Linux con notify-send
DESKTOP_NOTIFICATIONS="false"

# Sonido al terminar (true/false) - requiere beep o paquete sox
SOUND_ON_COMPLETE="false"

# ==================== INTEGRACIÓN CON OTRAS HERRAMIENTAS ====================

# Guardar automáticamente en CSV después de cada consulta (true/false)
AUTO_CSV="false"

# Ruta del archivo CSV automático
AUTO_CSV_PATH="$HOME/.config/mxtrack/consultas.csv"

# ==================== LIMITACIONES Y FILTROS ====================

# Bloquear IPs privadas (true/false) - no rastrear 192.168.x.x, 10.x.x.x, etc.
BLOCK_PRIVATE_IPS="true"

# Bloquear IPs de localhost (127.0.0.1, ::1)
BLOCK_LOCALHOST="true"

# ==================== COMPATIBILIDAD ====================

# Forzar modo texto plano (desactivar caracteres especiales)
FORCE_PLAIN_TEXT="false"

# Usar comandos alternativos si no existen los principales
# Por ejemplo, usar wget si curl no está disponible
FALLBACK_TO_WGET="true"

# ==================== FIN DEL ARCHIVO ====================
